services:
  mongodb:
    image: mongo:latest
    container_name: ${MONGO_CONTAINER}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb-data:/data/db
      - mongodb-config:/data/configdb
    networks:
      - app-network

  redis:
    image: redis:latest
    container_name: ${REDIS_CONTAINER}
    ports:
      - "${REDIS_PORT}:6379"
    networks:
      - app-network

  kafka:
    image: apache/kafka:latest
    container_name: ${KAFKA_CONTAINER}
    ports:
      - "${KAFKA_INTERNAL_PORT}:9092"
      - "${KAFKA_EXTERNAL_PORT}:29092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:${KAFKA_EXTERNAL_PORT}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    networks:
      - app-network
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      - kafka
    networks:
      - app-network

  springboot-app:
    image: ${APP_IMAGE}
    container_name: ${APP_CONTAINER}
    ports:
      - "${APP_PORT}:${APP_PORT}"
    environment:
      SPRING_DATA_MONGODB_URI: mongodb://${MONGO_CONTAINER}:27017/${MONGO_DB}
      SPRING_DATA_REDIS_HOST: ${REDIS_CONTAINER}
      SPRING_DATA_REDIS_PORT: ${REDIS_PORT}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_CONTAINER}:${KAFKA_INTERNAL_PORT}
    depends_on:
      - mongodb
      - redis
      - kafka
    networks:
      - app-network

networks:
  app-network:
    external: true
    name: ${NETWORK_NAME}

volumes:
  mongodb-data:
    external: true
    name: ${MONGODB_DATA_VOLUME}

  mongodb-config:
    external: true
    name: ${MONGODB_CONFIG_VOLUME}


